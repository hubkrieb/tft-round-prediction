# ruff.toml

[lint]
select = [
    "E",
    "W",   # pycodestyle
    "F",   # pyflakes
    "UP",  # pyupgrade
    "D",   # pydocstyle
    "I",   # isort
    "B",   # flake8-bugbear
    "NPY", # NumPy
    "YTT", # flake8-2020
    "Q",   # flake8-quotes
    "PLE",
    "PLW", # pylint (add "PLR" in the future)
    "PIE", # misc lints
    "TID", # tidy imports
    "ISC", # implicit string concatenation
    "TCH", # type-checking imports
    "ANN", # flake8-annotations
]
ignore = ["D100", "D104", "D105", "D107", "D212", "ISC001", "ANN204"]

[lint.isort]
# A local (gitignored) wandb/ run-logs directory makes ruff auto-classify
# `wandb` as first-party on dev machines; pin it so CI and local agree.
known-third-party = ["wandb"]

[lint.pydocstyle]
convention = "google"

[lint.pycodestyle]
max-doc-length = 100
max-line-length = 119

[format]
docstring-code-format = true
